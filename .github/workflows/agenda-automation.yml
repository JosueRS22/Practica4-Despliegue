name: CI Agenda Automation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  USER_NAME: "JosueRS22"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Log de inicio
      run: echo "Iniciando pruebas de la agenda de ${{ env.USER_NAME }}"

    - name: Build and Test con Maven
      run: mvn -B test
